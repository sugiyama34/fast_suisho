name: Hook Tests

# Runs on every push to main and every PR targeting main, with no path
# filters, so this check always reports a status and can be a required
# status check. See docs/ci.md.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core and jq
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dev dependencies
        run: uv sync --frozen

      - name: Run hook tests
        run: bats tests/hooks/
